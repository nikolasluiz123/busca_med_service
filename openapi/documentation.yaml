openapi: 3.0.3
info:
  title: BuscaMed API
  description: |
    API do sistema BuscaMed para processamento de prescrições médicas e cartelas de comprimidos utilizando LLM (Google Gemini), além da sincronização de dados de medicamentos da ANVISA.
  version: 0.1.0

servers:
  - url: https://buscamed-service-7zd5rrmmaq-rj.a.run.app
    description: Servidor Cloud Run
  - url: http://localhost:8080
    description: Servidor Local

security:
  - bearerAuth: []

paths:
  /v1/prescription/process/image:
    post:
      summary: Processa a imagem de uma prescrição médica
      description: Recebe o arquivo de imagem de uma receita médica e o texto auxiliar extraído no cliente, e extrai os dados estruturados dos medicamentos receitados priorizando a imagem.
      tags:
        - Prescription
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - text
                - image
                - mimeType
              properties:
                text:
                  type: string
                  description: O texto extraído previamente pelo cliente (ex OCR local).
                  example: "Tomar 1 comprimido de Dipirona 500mg de 8 em 8 horas durante 5 dias."
                image:
                  type: string
                  format: binary
                  description: Arquivo da imagem da prescrição médica.
                mimeType:
                  type: string
                  description: Tipo MIME da imagem (ex. image/jpeg, image/png).
                  example: "image/jpeg"
      responses:
        '200':
          description: Processamento realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionResponseDTO'
        '400':
          description: Requisição inválida, dados ou imagem não fornecidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '502':
          description: Falha na integração com o Google Gemini
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

  /v1/prescription/process/text:
    post:
      summary: Processa o texto de uma prescrição médica
      description: Recebe o texto contendo uma prescrição médica juntamente com a imagem de origem para backup, extraindo os dados estruturados dos medicamentos baseando-se no texto.
      tags:
        - Prescription
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - text
                - image
                - mimeType
              properties:
                text:
                  type: string
                  description: O texto extraído previamente pelo cliente que será processado pela LLM.
                  example: "Tomar 1 comprimido de Dipirona 500mg de 8 em 8 horas durante 5 dias."
                image:
                  type: string
                  format: binary
                  description: Arquivo da imagem que originou o texto (para registro histórico).
                mimeType:
                  type: string
                  description: Tipo MIME da imagem (ex. image/jpeg, image/png).
                  example: "image/jpeg"
      responses:
        '200':
          description: Processamento realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionResponseDTO'
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/prescription/history:
    get:
      summary: Obtém o histórico de processamentos de prescrições médicas
      description: Retorna uma lista de execuções da LLM para prescrições médicas. É possível filtrar a partir de uma data específica. Requer autenticação OIDC de serviço.
      tags:
        - Prescription
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
          required: false
          description: Filtro de data de início no formato ISO-8601. Se omitido, retorna desde o início (Epoch).
          example: "2026-03-01T00:00:00Z"
      responses:
        '200':
          description: Histórico recuperado com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LLMExecutionHistoryResponseDTO'
        '400':
          description: Formato de data inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/prescription/image:
    get:
      summary: Download da imagem da prescrição médica
      description: Retorna os bytes da imagem processada com base no ID da execução. Requer autenticação OIDC de serviço.
      tags:
        - Prescription
      parameters:
        - in: query
          name: executionId
          schema:
            type: string
          required: true
          description: ID da execução da LLM.
      responses:
        '200':
          description: Imagem retornada com sucesso
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: Imagem não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/pillpack/process/image:
    post:
      summary: Processa a imagem de uma cartela de comprimidos
      description: Recebe o arquivo de imagem do verso de uma cartela e o texto extraído previamente para extrair princípio ativo, dosagem e validade.
      tags:
        - Pill Pack
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - text
                - image
                - mimeType
              properties:
                text:
                  type: string
                  description: O texto extraído previamente pelo cliente.
                  example: "Aspirina 500mg Validade 10/25"
                image:
                  type: string
                  format: binary
                  description: Arquivo da imagem da cartela de medicamentos.
                mimeType:
                  type: string
                  description: Tipo MIME da imagem (ex. image/jpeg, image/png).
                  example: "image/jpeg"
      responses:
        '200':
          description: Processamento realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PillPackResponseDTO'
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/pillpack/process/text:
    post:
      summary: Processa o texto de uma cartela de comprimidos
      description: Recebe a transcrição de texto do verso de uma cartela de comprimidos e a imagem de backup, estruturando os dados.
      tags:
        - Pill Pack
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - text
                - image
                - mimeType
              properties:
                text:
                  type: string
                  description: O texto extraído ou digitado que será processado pela LLM.
                  example: "Aspirina 500mg Validade 10/25"
                image:
                  type: string
                  format: binary
                  description: Arquivo da imagem da cartela de medicamentos para registro histórico.
                mimeType:
                  type: string
                  description: Tipo MIME da imagem (ex. image/jpeg, image/png).
                  example: "image/jpeg"
      responses:
        '200':
          description: Processamento realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PillPackResponseDTO'
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/pillpack/history:
    get:
      summary: Obtém o histórico de processamentos de cartelas de comprimidos
      description: Retorna uma lista de execuções da LLM para cartelas de comprimidos. É possível filtrar a partir de uma data específica. Requer autenticação OIDC de serviço.
      tags:
        - Pill Pack
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
          required: false
          description: Filtro de data de início no formato ISO-8601. Se omitido, retorna desde o início (Epoch).
          example: "2026-03-01T00:00:00Z"
      responses:
        '200':
          description: Histórico recuperado com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LLMExecutionHistoryResponseDTO'
        '400':
          description: Formato de data inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/pillpack/image:
    get:
      summary: Download da imagem da cartela de comprimidos
      description: Retorna os bytes da imagem processada com base no ID da execução. Requer autenticação OIDC de serviço.
      tags:
        - Pill Pack
      parameters:
        - in: query
          name: executionId
          schema:
            type: string
          required: true
          description: ID da execução da LLM.
      responses:
        '200':
          description: Imagem retornada com sucesso
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: Imagem não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/anvisa/import/medications:
    post:
      summary: Dispara a sincronização de medicamentos da ANVISA
      description: Inicia o download, processamento do CSV da ANVISA e atualização (upsert) dos dados no banco Firestore.
      tags:
        - Anvisa
      responses:
        '202':
          description: Processamento assíncrono aceito e iniciado
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '502':
          description: Erro na integração com o portal de dados abertos da ANVISA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

  /v1/anvisa/import/leaflet:
    post:
      summary: Dispara a sincronização de bulas da ANVISA
      description: Inicia a consulta e o download em PDF das bulas (paciente e profissional) dos medicamentos pendentes na base.
      tags:
        - Anvisa
      responses:
        '202':
          description: Processamento assíncrono aceito e iniciado
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '502':
          description: Erro na integração com a API da ANVISA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Insira o token JWT retornado pelo Google Identity / OIDC / Firebase. 
        Para requisições administrativas (OIDC), você pode gerar um token usando impersonation de uma Service Account através do comando local:
        `gcloud auth print-identity-token --impersonate-service-account=SUA_SERVICE_ACCOUNT@SEU_PROJETO.iam.gserviceaccount.com --include-email`

  responses:
    UnauthorizedError:
      description: Falha de autenticação (Token ausente ou inválido)

  schemas:
    ErrorResponseDTO:
      type: object
      properties:
        errorCode:
          type: string
          description: Código interno do erro.
          example: "BUSINESS_RULE_ERROR"
        message:
          type: string
          description: Mensagem descritiva e amigável para o usuário.
          example: "É obrigatório informar uma imagem para processamento"
        timestamp:
          type: string
          format: date-time
          description: Momento exato em que o erro ocorreu.
          example: "2026-03-27T10:15:30Z"
        path:
          type: string
          description: Caminho do endpoint que gerou o erro.
          example: "/v1/prescription/process/image"
        traceId:
          type: string
          nullable: true
          description: ID de rastreamento no Google Cloud Trace.
          example: "105445aa7843bc8bf206b12000100000"

    LLMExecutionHistoryResponseDTO:
      type: object
      properties:
        id:
          type: string
          nullable: true
          description: Identificador único da execução.
          example: "8f7311f4-3079-4be6-a6fb-96f7c8585c5b"
        type:
          type: string
          description: O tipo de processamento realizado na LLM (IMAGE ou TEXT).
          example: "IMAGE"
        inputText:
          type: string
          nullable: true
          description: O texto fornecido como entrada/contexto para a execução.
          example: "Dipirona 500mg"
        inputTokens:
          type: integer
          description: Quantidade de tokens enviados no prompt.
          example: 125
        outputTokens:
          type: integer
          description: Quantidade de tokens retornados pela LLM.
          example: 45
        result:
          type: string
          nullable: true
          description: Resultado formatado em JSON retornado pela LLM (em formato string).
        success:
          type: boolean
          description: Indica se a execução foi finalizada com sucesso.
          example: true
        startDate:
          type: string
          format: date-time
          description: Data e hora de início da execução.
          example: "2026-03-27T10:15:30Z"
        endDate:
          type: string
          format: date-time
          description: Data e hora de término da execução.
          example: "2026-03-27T10:15:35Z"
        storageImagePath:
          type: string
          nullable: true
          description: Caminho do arquivo de imagem salvo no storage.
          example: "gs://gemini_processed_images/medical_prescription/123.jpg"
        prompt:
          type: string
          description: Arquivo de prompt utilizado na requisição.
          example: "medical_prescription_v1"

    ValueUnitDTO:
      type: object
      properties:
        valor:
          type: number
          nullable: true
          example: 500.0
        unidade:
          type: string
          nullable: true
          example: "mg"

    FrequencyDTO:
      type: object
      properties:
        intervalo:
          type: number
          nullable: true
          example: 8.0
        unidade:
          type: string
          nullable: true
          example: "horas"
        texto_orientacao:
          type: string
          nullable: true
          example: "De 8 em 8 horas após as refeições"

    DurationDTO:
      type: object
      properties:
        valor:
          type: number
          nullable: true
          example: 5.0
        unidade:
          type: string
          nullable: true
          example: "dias"
        uso_continuo:
          type: boolean
          example: false

    PrescriptionMedicationDTO:
      type: object
      properties:
        nome:
          type: string
          nullable: true
          example: "Amoxicilina"
        apresentacao_dosagem:
          $ref: '#/components/schemas/ValueUnitDTO'
        dose:
          $ref: '#/components/schemas/ValueUnitDTO'
        frequencia:
          $ref: '#/components/schemas/FrequencyDTO'
        duracao:
          $ref: '#/components/schemas/DurationDTO'
        quantidade_total_prescrita:
          $ref: '#/components/schemas/ValueUnitDTO'

    PrescriptionResponseDTO:
      type: object
      description: Estrutura retornada pelo Gemini baseada no prompt de prescrição médica.
      properties:
        medicamentos:
          type: array
          items:
            $ref: '#/components/schemas/PrescriptionMedicationDTO'

    PillPackComponentDTO:
      type: object
      properties:
        principio_ativo:
          type: string
          example: "Paracetamol"
        dosagem_valor:
          type: number
          nullable: true
          example: 750.0
        dosagem_unidade:
          type: string
          nullable: true
          example: "mg"

    PillPackUsageDTO:
      type: object
      properties:
        vias_administracao:
          type: array
          items:
            type: string
          example: ["Uso oral"]
        restricoes_idade:
          type: array
          items:
            type: string
          example: ["Uso adulto e pediátrico acima de 12 anos"]

    PillPackResponseDTO:
      type: object
      description: Estrutura retornada pelo Gemini baseada no prompt de cartela de medicamentos.
      properties:
        nome_medicamento:
          type: string
          nullable: true
          example: "Tylenol"
        componentes:
          type: array
          items:
            $ref: '#/components/schemas/PillPackComponentDTO'
        uso:
          $ref: '#/components/schemas/PillPackUsageDTO'
        indicacoes:
          type: array
          items:
            type: string
          example: ["Dor", "Febre"]
        data_validade:
          type: string
          nullable: true
          example: "10/25"
        lote:
          type: string
          nullable: true
          example: "L123456"