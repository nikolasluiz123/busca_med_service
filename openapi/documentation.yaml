openapi: 3.0.3
info:
  title: BuscaMed API
  description: |
    API do sistema BuscaMed para processamento de prescrições médicas e cartelas de comprimidos utilizando LLM (Google Gemini), além da sincronização de dados de medicamentos da ANVISA.
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Servidor Local

security:
  - bearerAuth: []

paths:
  /v1/prescription/process/image:
    post:
      summary: Processa a imagem de uma prescrição médica
      description: Recebe o arquivo de imagem de uma receita médica e extrai os dados estruturados dos medicamentos receitados (nome, dosagem, frequência e duração).
      tags:
        - Prescription
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
                - mimeType
              properties:
                image:
                  type: string
                  format: binary
                  description: Arquivo da imagem da prescrição médica.
                mimeType:
                  type: string
                  description: Tipo MIME da imagem (ex. image/jpeg, image/png).
                  example: "image/jpeg"
      responses:
        '200':
          description: Processamento realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionResponse'
        '400':
          description: Requisição inválida ou imagem não fornecida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '502':
          description: Falha na integração com o Google Gemini
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

  /v1/prescription/process/text:
    post:
      summary: Processa o texto de uma prescrição médica
      description: Recebe o texto contendo uma prescrição médica e extrai os dados estruturados dos medicamentos receitados.
      tags:
        - Prescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextRequestDTO'
      responses:
        '200':
          description: Processamento realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionResponse'
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/prescription/history:
    get:
      summary: Obtém o histórico de processamentos de prescrições médicas
      description: Retorna uma lista de execuções da LLM para prescrições médicas. É possível filtrar a partir de uma data específica. Requer autenticação OIDC de serviço.
      tags:
        - Prescription
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
          required: false
          description: Filtro de data de início no formato ISO-8601. Se omitido, retorna desde o início (Epoch).
          example: "2026-03-01T00:00:00Z"
      responses:
        '200':
          description: Histórico recuperado com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LLMExecutionHistoryResponseDTO'
        '400':
          description: Formato de data inválido
          content:
            text/plain:
              schema:
                type: string
                example: "O formato da data 'startDate' é inválido. Utilize o padrão ISO-8601."
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/pillpack/process/image:
    post:
      summary: Processa a imagem de uma cartela de comprimidos
      description: Recebe o arquivo de imagem do verso de uma cartela (blister) e extrai o princípio ativo, dosagem e data de validade.
      tags:
        - Pill Pack
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
                - mimeType
              properties:
                image:
                  type: string
                  format: binary
                  description: Arquivo da imagem da cartela de medicamentos.
                mimeType:
                  type: string
                  description: Tipo MIME da imagem (ex. image/jpeg, image/png).
                  example: "image/jpeg"
      responses:
        '200':
          description: Processamento realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PillPackResponse'
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/pillpack/process/text:
    post:
      summary: Processa o texto de uma cartela de comprimidos
      description: Recebe a transcrição de texto do verso de uma cartela de comprimidos e estrutura os dados.
      tags:
        - Pill Pack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextRequestDTO'
      responses:
        '200':
          description: Processamento realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PillPackResponse'
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/pillpack/history:
    get:
      summary: Obtém o histórico de processamentos de cartelas de comprimidos
      description: Retorna uma lista de execuções da LLM para cartelas de comprimidos. É possível filtrar a partir de uma data específica. Requer autenticação OIDC de serviço.
      tags:
        - Pill Pack
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
          required: false
          description: Filtro de data de início no formato ISO-8601. Se omitido, retorna desde o início (Epoch).
          example: "2026-03-01T00:00:00Z"
      responses:
        '200':
          description: Histórico recuperado com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LLMExecutionHistoryResponseDTO'
        '400':
          description: Formato de data inválido
          content:
            text/plain:
              schema:
                type: string
                example: "O formato da data 'startDate' é inválido. Utilize o padrão ISO-8601."
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/anvisa/import:
    post:
      summary: Dispara a sincronização de medicamentos da ANVISA
      description: Inicia o download, processamento do CSV da ANVISA e atualização (upsert) dos dados no banco Firestore.
      tags:
        - Anvisa
      responses:
        '202':
          description: Processamento assíncrono aceito e iniciado
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '502':
          description: Erro na integração com o portal de dados abertos da ANVISA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Insira o token JWT retornado pelo Google Identity / OIDC / Firebase. 
        Para requisições administrativas (OIDC), você pode gerar um token usando impersonation de uma Service Account através do comando local:
        `gcloud auth print-identity-token --impersonate-service-account=SUA_SERVICE_ACCOUNT@SEU_PROJETO.iam.gserviceaccount.com --include-email`
        
        Exemplo: `Bearer eyJhbGciOiJSUzI1...`

  responses:
    UnauthorizedError:
      description: Falha de autenticação (Token ausente ou inválido)

  schemas:
    TextRequestDTO:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: O texto extraído ou digitado que será processado pela LLM.
          example: "Tomar 1 comprimido de Dipirona 500mg de 8 em 8 horas durante 5 dias."

    ErrorResponseDTO:
      type: object
      properties:
        errorCode:
          type: string
          description: Código interno do erro.
          example: "BUSINESS_RULE_ERROR"
        message:
          type: string
          description: Mensagem descritiva e amigável para o usuário.
          example: "É obrigatório informar uma imagem para processamento"
        timestamp:
          type: string
          format: date-time
          description: Momento exato em que o erro ocorreu.
          example: "2026-03-27T10:15:30Z"
        path:
          type: string
          description: Caminho do endpoint que gerou o erro.
          example: "/v1/prescription/process-image"
        traceId:
          type: string
          nullable: true
          description: ID de rastreamento no Google Cloud Trace.
          example: "105445aa7843bc8bf206b12000100000"

    LLMExecutionHistoryResponseDTO:
      type: object
      properties:
        id:
          type: string
          nullable: true
          description: Identificador único da execução.
          example: "8f7311f4-3079-4be6-a6fb-96f7c8585c5b"
        inputTokens:
          type: integer
          description: Quantidade de tokens enviados no prompt.
          example: 125
        outputTokens:
          type: integer
          description: Quantidade de tokens retornados pela LLM.
          example: 45
        result:
          type: string
          nullable: true
          description: Resultado formatado em JSON retornado pela LLM (em formato string).
        success:
          type: boolean
          description: Indica se a execução foi finalizada com sucesso.
          example: true
        startDate:
          type: string
          format: date-time
          description: Data e hora de início da execução.
          example: "2026-03-27T10:15:30Z"
        endDate:
          type: string
          format: date-time
          description: Data e hora de término da execução.
          example: "2026-03-27T10:15:35Z"
        storageImagePath:
          type: string
          nullable: true
          description: Caminho do arquivo de imagem salvo no storage.
          example: "gs://gemini_processed_images/medical_prescription/123.jpg"

    PrescriptionResponse:
      type: object
      description: Estrutura retornada pelo Gemini baseada no prompt de prescrição médica.
      properties:
        medicamentos:
          type: array
          items:
            type: object
            properties:
              nome:
                type: string
                nullable: true
                example: "Amoxicilina"
              dosagem:
                type: string
                nullable: true
                example: "500mg"
              frequencia:
                type: string
                nullable: true
                example: "De 8 em 8 horas"
              duracao:
                type: string
                nullable: true
                example: "7 dias"

    PillPackResponse:
      type: object
      description: Estrutura retornada pelo Gemini baseada no prompt de cartela de medicamentos.
      properties:
        principio_ativo:
          type: string
          nullable: true
          example: "Paracetamol"
        dosagem:
          type: string
          nullable: true
          example: "750mg"
        data_validade:
          type: string
          nullable: true
          example: "10/25"